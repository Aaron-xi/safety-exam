<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>安全生产题库</title>
<style>
:root {
  --bg: #f5f7fa;
  --card: #fff;
  --text: #1a1a2e;
  --text2: #555;
  --text3: #888;
  --primary: #e85d04;
  --primary-light: #fff3e6;
  --primary-dark: #c44802;
  --success: #2ecc71;
  --danger: #e74c3c;
  --warning: #f39c12;
  --border: #e8ecf1;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --radius: 14px;
  --radius-sm: 10px;
  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --font: -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
}
[data-theme=dark] {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --text: #e8e8f0;
  --text2: #999;
  --text3: #666;
  --border: #2a2a3e;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
  --primary-light: #1a0f05;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select{font-family:var(--font);font-size:inherit}
.hide{display:none!important}

/* Splash */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#e85d04,#c44802);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:28px;font-weight:700;margin-bottom:8px}
#splash p{font-size:14px;opacity:.8;margin-bottom:24px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Layout */
#app{display:none;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px)}
#app.active{display:block}
.page{padding:16px;display:none}
.page.active{display:block}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:100;background:var(--bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.header h2{font-size:18px;font-weight:600}
.header-btn{width:36px;height:36px;border:none;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);box-shadow:var(--shadow)}

/* Bottom Nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));height:calc(var(--nav-h) + var(--safe-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;transition:color .2s}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:22px;line-height:1}
.nav-item span{font-size:10px}

/* Home Cards */
.greeting{padding:4px 0 16px}
.greeting h1{font-size:24px;font-weight:700}
.greeting p{color:var(--text2);font-size:13px;margin-top:4px}
.stats-ov{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:24px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:11px;color:var(--text3);margin-top:4px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.menu-item{background:var(--card);border-radius:var(--radius);padding:20px 16px;box-shadow:var(--shadow);cursor:pointer;border:none;text-align:left;color:var(--text);transition:transform .15s}
.menu-item:active{transform:scale(.96)}
.menu-item .icon{font-size:28px;margin-bottom:8px;display:block}
.menu-item .title{font-size:15px;font-weight:600}
.menu-item .desc{font-size:11px;color:var(--text3);margin-top:4px}

/* Question Card */
.q-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:12px}
.q-num{font-size:12px;color:var(--text3);margin-bottom:8px;display:flex;justify-content:space-between}
.q-type{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.q-type.mc{background:#e3f2fd;color:#1976d2}
.q-type.tf{background:#fce4ec;color:#c62828}
.q-text{font-size:16px;line-height:1.7;margin-bottom:16px}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:none;cursor:pointer;text-align:left;font-size:14px;line-height:1.5;color:var(--text);transition:all .15s;width:100%}
.q-opt:active{transform:scale(.98)}
.q-opt .letter{width:24px;height:24px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:var(--text2)}
.q-opt.selected{border-color:var(--primary);background:var(--primary-light)}
.q-opt.selected .letter{background:var(--primary);color:#fff}
.q-opt.correct{border-color:var(--success);background:#e8f8ef}
.q-opt.correct .letter{background:var(--success);color:#fff}
.q-opt.wrong{border-color:var(--danger);background:#fde8e8}
.q-opt.wrong .letter{background:var(--danger);color:#fff}
.q-opt.disabled{pointer-events:none;opacity:.7}

/* Q Nav */
.q-nav{display:flex;gap:10px;margin-top:16px}
.q-nav button{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.q-nav button:active{transform:scale(.97)}
.btn-prev{background:var(--bg);color:var(--text)}
.btn-next{background:var(--primary);color:#fff}
.btn-next:disabled{opacity:.5}
.btn-star{width:44px;flex:none;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:none;color:var(--text3)}
.btn-star.active{color:#f1c40f}

/* Exam */
.exam-config{padding:20px;text-align:center}
.exam-config h3{margin-bottom:16px;font-size:18px}
.exam-config select{padding:10px 20px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);color:var(--text);font-size:16px;margin-bottom:12px;width:200px}
.exam-progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.exam-progress .bar{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.exam-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--text2)}
.exam-timer{font-weight:600;color:var(--primary)}
.result-card{text-align:center;padding:30px 20px}
.result-card .score{font-size:64px;font-weight:700;color:var(--primary)}
.result-card .label{font-size:16px;color:var(--text2);margin-top:4px}
.result-card .detail{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:24px 0}

/* Wrong book */
.wrong-item{background:var(--card);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer}
.wrong-item .q{padding-right: 24px;} 
.wrong-item .ans{font-size:12px;margin-top:8px;color:var(--text2)}
.wrong-item .ans .yours{color:var(--danger)}
.wrong-item .ans .correct{color:var(--success)}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;padding:10px 14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--primary)}
.search-bar select{padding:10px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);color:var(--text);font-size:13px}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-tab .count{font-size:11px;opacity:.7;margin-left:4px}

/* Stats page */
.chart-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.chart-bar .label{font-size:12px;width:60px;flex-shrink:0;color:var(--text2)}
.chart-bar .track{flex:1;height:20px;background:var(--border);border-radius:10px;overflow:hidden}
.chart-bar .fill{height:100%;border-radius:10px;transition:width .5s}
.chart-bar .fill.green{background:var(--success)}
.chart-bar .fill.red{background:var(--danger)}
.chart-bar .fill.orange{background:var(--warning)}
.chart-bar .val{font-size:12px;width:40px;text-align:right;color:var(--text2)}

/* Progress ring */
.progress-ring{width:120px;height:120px;margin:0 auto 16px;position:relative}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .bg{fill:none;stroke:var(--border);stroke-width:8}
.progress-ring .fg{fill:none;stroke:var(--primary);stroke-width:8;stroke-linecap:round;transition:stroke-dasharray .5s}
.progress-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-ring .pct{font-size:28px;font-weight:700;color:var(--primary);line-height:1}
.progress-ring .plabel{font-size:11px;color:var(--text3)}

/* Favorites star */
.fav-star{cursor:pointer;font-size:22px;border:none;background:none;padding:4px;color:var(--text3);transition:color .2s}
.fav-star.active{color:#f1c40f}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal-content{background:var(--card);border-radius:var(--radius);padding:24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto}
.modal-content h3{margin-bottom:12px}
.modal-content p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.modal-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btn:active{transform:scale(.97)}
.modal-btn.primary{background:var(--primary);color:#fff}
.modal-btn.secondary{background:var(--bg);color:var(--text);margin-top:8px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Review list */
.review-list{max-height:400px;overflow-y:auto}
.review-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.review-item:last-child{border-bottom:none}
.review-item .r-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.r-correct{background:var(--success)}
.r-wrong{background:var(--danger)}
.r-skipped{background:var(--text3)}

/* Streak */
.streak{display:flex;gap:4px;justify-content:center;margin:12px 0}
.streak-day{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--border);color:var(--text3)}
.streak-day.done{background:var(--primary);color:#fff}
.streak-day.today{border:2px solid var(--primary)}

/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
#toast.show{opacity:1}

/* Scroll buttons for Q-nav in TF mode */
.q-nav-wrap{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.q-nav-wrap button{flex:1;min-width:60px;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.q-nav-wrap button:active{transform:scale(.97)}
</style>
</head>
<body>

<div id="splash">
  <h1>📚 安全生产题库</h1>
  <p>企业主要负责人和安全管理人员</p>
  <div class="spin"></div>
</div>

<div id="toast"></div>

<div id="app">
  <!-- Header -->
  <div class="header" id="app-header">
    <h2 id="header-title">安全生产题库</h2>
    <button class="header-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- ===== HOME ===== -->
  <div class="page active" id="page-home">
    <div class="greeting">
      <h1 id="greeting-text">你好 👋</h1>
      <p id="greeting-sub">今天也要加油学习！</p>
    </div>
    <div class="stats-ov">
      <div class="stat-card"><div class="num" id="stat-learned">0</div><div class="label">已学习</div></div>
      <div class="stat-card"><div class="num" id="stat-accuracy">0%</div><div class="label">正确率</div></div>
      <div class="stat-card"><div class="num" id="stat-streak">0</div><div class="label">连续天数</div></div>
    </div>
    <div class="menu-grid">
      <button class="menu-item" onclick="showPage('learn')">
        <span class="icon">📖</span>
        <div class="title">学习模式</div>
        <div class="desc">按顺序浏览全部题目</div>
      </button>
      <button class="menu-item" onclick="showExamConfig()">
        <span class="icon">📝</span>
        <div class="title">考试模式</div>
        <div class="desc">随机抽题，模拟考试</div>
      </button>
      <button class="menu-item" onclick="showPage('wrong')">
        <span class="icon">❌</span>
        <div class="title">错题本</div>
        <div class="desc" id="wrong-count-desc">复习做错的题目</div>
      </button>
      <button class="menu-item" onclick="startDaily()">
        <span class="icon">🔥</span>
        <div class="title">每日挑战</div>
        <div class="desc" id="daily-desc">每天10题，保持手感</div>
      </button>
      <button class="menu-item" onclick="showPage('fav')">
        <span class="icon">⭐</span>
        <div class="title">收藏夹</div>
        <div class="desc" id="fav-count-desc">收藏的题目</div>
      </button>
      <button class="menu-item" onclick="showPage('stats')">
        <span class="icon">📊</span>
        <div class="title">学习统计</div>
        <div class="desc">查看学习数据</div>
      </button>
    </div>
  </div>

  <!-- ===== LEARN ===== -->
  <div class="page" id="page-learn">
    <div class="search-bar">
      <input type="text" id="learn-search" placeholder="搜索题目..." oninput="filterLearnQuestions()">
      <select id="learn-type-filter" onchange="filterLearnQuestions()">
        <option value="all">全部</option>
        <option value="mc">选择题</option>
        <option value="tf">判断题</option>
      </select>
    </div>
    <div id="learn-list"></div>
    <div id="learn-detail" class="hide">
      <div class="q-card" id="learn-q-card"></div>
      <div class="q-nav-wrap">
        <button class="btn-prev" onclick="learnPrev()">← 上一题</button>
        <button class="btn-star" id="learn-star" onclick="toggleLearnFav()">☆</button>
        <button class="btn-next" onclick="learnNext()">下一题 →</button>
      </div>
      <button style="margin-top:12px;width:100%;padding:10px;border:none;border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer" onclick="showLearnList()">返回题目列表</button>
    </div>
  </div>

  <!-- ===== EXAM CONFIG ===== -->
  <div class="page" id="page-exam-config">
    <div class="exam-config">
      <h3>📝 模拟考试</h3>
      <div style="margin-bottom:16px;color:var(--text2);font-size:14px">从题库中随机抽题，模拟真实考试</div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">题目数量</label>
        <select id="exam-count">
          <option value="10">10 题</option>
          <option value="20">20 题</option>
          <option value="50">50 题</option>
          <option value="100" selected>100 题（推荐）</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">题目类型</label>
        <select id="exam-type">
          <option value="all">全部混合</option>
          <option value="mc">仅选择题</option>
          <option value="tf">仅判断题</option>
        </select>
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">考试时间</label>
        <select id="exam-time">
          <option value="0">不限时</option>
          <option value="15">15 分钟</option>
          <option value="30">30 分钟</option>
          <option value="60" selected>60 分钟</option>
          <option value="90">90 分钟</option>
          <option value="120">120 分钟</option>
        </select>
      </div>
      <button class="modal-btn primary" onclick="startExam()" style="width:200px;margin:0 auto">开始考试</button>
      <button class="modal-btn secondary" onclick="showPage('home')" style="width:200px;margin:12px auto 0">返回首页</button>
    </div>
  </div>

  <!-- ===== EXAM ===== -->
  <div class="page" id="page-exam">
    <div class="exam-progress"><div class="bar" id="exam-progress-bar" style="width:0%"></div></div>
    <div class="exam-head">
      <span id="exam-pos">1/100</span>
      <span class="exam-timer" id="exam-timer">00:00</span>
    </div>
    <div class="q-card" id="exam-q-card"></div>
    <div class="q-nav-wrap">
      <button class="btn-prev" onclick="examPrev()">← 上一题</button>
      <button id="exam-mark-btn" onclick="examToggleMark()" style="flex:none;width:44px;background:var(--bg);border-radius:var(--radius-sm);border:none;font-size:18px;cursor:pointer;color:var(--text3)">🏳️</button>
      <button class="btn-next" id="exam-next-btn" onclick="examNext()">下一题 →</button>
    </div>
  </div>

  <!-- ===== EXAM RESULT ===== -->
  <div class="page" id="page-exam-result">
    <div class="result-card">
      <div class="progress-ring">
        <svg width="120" height="120"><circle class="bg" cx="60" cy="60" r="50"/><circle class="fg" id="result-ring" cx="60" cy="60" r="50"/></svg>
        <div class="center"><div class="pct" id="result-score">0</div><div class="plabel">正确率</div></div>
      </div>
      <div class="detail">
        <div><div style="font-size:24px;font-weight:600;color:var(--success)" id="result-correct">0</div><div style="font-size:12px;color:var(--text3)">正确</div></div>
        <div><div style="font-size:24px;font-weight:600;color:var(--danger)" id="result-wrong">0</div><div style="font-size:12px;color:var(--text3)">错误</div></div>
        <div><div style="font-size:24px;font-weight:600;color:var(--text2)" id="result-time">0</div><div style="font-size:12px;color:var(--text3)">用时(分)</div></div>
      </div>
      <button class="modal-btn primary" onclick="showExamReview()">查看答题详情</button>
      <button class="modal-btn secondary" onclick="showPage('home')">返回首页</button>
    </div>
  </div>

  <!-- ===== EXAM REVIEW ===== -->
  <div class="page" id="page-exam-review">
    <div class="review-list" id="review-list"></div>
    <button class="modal-btn secondary" onclick="showPage('exam-result'); initResultPage()" style="margin-top:12px">返回结果</button>
  </div>

  <!-- ===== WRONG ===== -->
  <div class="page" id="page-wrong">
    <div class="filter-tabs" id="wrong-tabs">
      <button class="filter-tab active" onclick="filterWrong('all',this)">全部 <span class="count" id="wrong-all-count">0</span></button>
      <button class="filter-tab" onclick="filterWrong('mc',this)">选择题 <span class="count" id="wrong-mc-count">0</span></button>
      <button class="filter-tab" onclick="filterWrong('tf',this)">判断题 <span class="count" id="wrong-tf-count">0</span></button>
    </div>
    <div style="text-align:right;margin-bottom:12px">
      <button onclick="retakeWrong()" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--primary);background:none;color:var(--primary);font-size:12px;cursor:pointer">重做错题</button>
      <button onclick="clearWrong()" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--danger);background:none;color:var(--danger);font-size:12px;cursor:pointer;margin-left:8px">清空</button>
    </div>
    <div id="wrong-list"></div>
    <div id="wrong-empty" class="hide" style="text-align:center;padding:40px 0;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">🎉</div>
      <p>暂无错题，继续保持！</p>
    </div>
  </div>

  <!-- ===== FAVORITES ===== -->
  <div class="page" id="page-fav">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterFav('all',this)">全部 <span class="count" id="fav-all-count">0</span></button>
      <button class="filter-tab" onclick="filterFav('mc',this)">选择题 <span class="count" id="fav-mc-count">0</span></button>
      <button class="filter-tab" onclick="filterFav('tf',this)">判断题 <span class="count" id="fav-tf-count">0</span></button>
    </div>
    <div id="fav-list"></div>
    <div id="fav-empty" class="hide" style="text-align:center;padding:40px 0;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">⭐</div>
      <p>还没有收藏题目<br>在学习或考试中可以点击 ☆ 收藏</p>
    </div>
  </div>

  <!-- ===== STATS ===== -->
  <div class="page" id="page-stats">
    <div class="progress-ring" style="width:100px;height:100px">
      <svg width="100" height="100"><circle class="bg" cx="50" cy="50" r="42"/><circle class="fg" id="stats-ring" cx="50" cy="50" r="42"/></svg>
      <div class="center"><div class="pct" id="stats-pct">0%</div><div class="plabel">总正确率</div></div>
    </div>
    <div style="margin-bottom:20px">
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">已学习题目</span><span style="font-weight:600" id="stats-learned">0</span>
      </div>
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">选择题正确率</span><span style="font-weight:600" id="stats-mc-acc">0%</span>
      </div>
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">判断题正确率</span><span style="font-weight:600" id="stats-tf-acc">0%</span>
      </div>
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">错题总数</span><span style="font-weight:600" id="stats-wrong">0</span>
      </div>
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">收藏题目</span><span style="font-weight:600" id="stats-fav">0</span>
      </div>
      <div class="stat-item" style="display:flex;justify-content:space-between;padding:10px">
        <span style="color:var(--text2)">连续学习天数</span><span style="font-weight:600" id="stats-streak">0</span>
      </div>
    </div>
    <div style="margin-bottom:8px;font-size:14px;font-weight:600">答题分布</div>
    <div id="stats-chart"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div id="bottom-nav">
  <button class="nav-item active" onclick="showPage('home')"><span class="icon">🏠</span><span>首页</span></button>
  <button class="nav-item" onclick="showPage('learn')"><span class="icon">📖</span><span>学习</span></button>
  <button class="nav-item" onclick="showExamConfig()"><span class="icon">📝</span><span>考试</span></button>
  <button class="nav-item" onclick="showPage('wrong')"><span class="icon">❌</span><span>错题</span></button>
  <button class="nav-item" onclick="showPage('stats')"><span class="icon">📊</span><span>统计</span></button>
</div>

<script>
// ===== DATA =====
let questions = [];
let appData = null;

// ===== STATE =====
let state = {
  learned: {},        // { qId: true }
  wrong: {},          // { qId: { count, lastWrong } }
  fav: {},            // { qId: true }
  exams: [],          // [ { date, score, total, correct, wrong, time } ]
  daily: { date: '', done: false, streak: 0 },
  darkMode: false,
  lastStudyDate: ''
};

// Learn mode state
let learnFilteredIds = [];
let learnIdx = 0;
let learnDetail = false;

// Exam state
let examQuestions = [];
let examIdx = 0;
let examAnswers = {};     // { qId: answer }
let examMarked = {};      // { qId: true }
let examTimer = null;
let examSeconds = 0;
let examLimit = 0;
let examDone = false;
let examResult = null;

// Wrong retake
let wrongRetakeQs = [];
let wrongRetakeIdx = 0;
let wrongRetakeAnswers = {};

// ===== INIT =====
async function init() {
  // Load data
  try {
    const res = await fetch('app_data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    appData = await res.json();
    if (!appData.questions || appData.questions.length === 0) throw new Error('题库为空');
    questions = appData.questions;
  } catch(e) {
    console.error('Failed to load data:', e);
    document.getElementById('splash').innerHTML = '<h1>❌ 加载失败</h1><p>请确保 app_data.json 文件存在且格式正确。</p><p style="font-size:12px;opacity:.7;margin-top:8px">使用方式：python start_app.py<br>然后访问 http://localhost:8080/index.html</p>';
    document.getElementById('splash').style.display = 'flex';
    return;
  }
  
  // Load state from localStorage
  loadState();
  
  // Apply theme
  if (state.darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
  
  // Show app
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('active');
    updateHome();
    document.getElementById('header-title').textContent = '安全生产题库';
  }, 600);
}

function loadState() {
  try {
    const saved = localStorage.getItem('safety_exam_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) { console.error('Load state error:', e); }
}

function saveState() {
  try {
    localStorage.setItem('safety_exam_state', JSON.stringify(state));
  } catch(e) { console.error('Save state error:', e); }
}

// ===== NAVIGATION =====
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { home:0, learn:1, wrong:3, stats:4 };
  if (navMap[page] !== undefined) {
    document.querySelectorAll('.nav-item')[navMap[page]].classList.add('active');
  }
  const titles = { home:'安全生产题库', learn:'学习模式', wrong:'错题本', fav:'收藏夹', stats:'学习统计' };
  document.getElementById('header-title').textContent = titles[page] || '安全生产题库';
  
  if (page === 'learn') initLearn();
  if (page === 'wrong') renderWrongList('all');
  if (page === 'fav') renderFavList('all');
  if (page === 'stats') renderStats();
  if (page === 'home') updateHome();
}

// ===== THEME =====
function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = state.darkMode ? '☀️' : '🌙';
  saveState();
}

// ===== HOME =====
function updateHome() {
  const hours = new Date().getHours();
  const greet = hours < 6 ? '夜深了 🌙' : hours < 9 ? '早上好 🌅' : hours < 12 ? '上午好 ☀️' : hours < 14 ? '中午好 🌞' : hours < 18 ? '下午好 🌤️' : '晚上好 🌆';
  document.getElementById('greeting-text').textContent = greet + ' 👋';
  
  const learned = Object.keys(state.learned).length;
  const total = questions.length;
  const wrongCount = Object.keys(state.wrong).length;
  
  document.getElementById('stat-learned').textContent = learned;
  
  // Calculate accuracy
  const exams = state.exams || [];
  let totalCorrect = 0, totalAnswered = 0;
  exams.forEach(e => { totalCorrect += e.correct || 0; totalAnswered += e.total || 0; });
  const acc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;
  document.getElementById('stat-accuracy').textContent = acc + '%';
  
  // Check daily streak
  checkDailyStreak();
  document.getElementById('stat-streak').textContent = state.daily.streak || 0;
  
  document.getElementById('wrong-count-desc').textContent = wrongCount > 0 ? `${wrongCount} 道待复习` : '暂无错题';
  const favCount = Object.keys(state.fav).length;
  document.getElementById('fav-count-desc').textContent = favCount > 0 ? `${favCount} 道已收藏` : '暂无收藏';
}

function checkDailyStreak() {
  const today = new Date().toDateString();
  const last = state.lastStudyDate;
  if (last !== today) {
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if (last === yesterday) {
      state.daily.streak = (state.daily.streak || 0) + 1;
    } else if (last) {
      state.daily.streak = 1;
    }
    state.lastStudyDate = today;
    saveState();
  }
}

// ===== TOAST =====
function showToast(msg, duration=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = 'rgba(0,0,0,.8)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== LEARN MODE =====
let learnQuestions = [];

function initLearn() {
  learnQuestions = [...questions];
  document.getElementById('learn-search').value = '';
  document.getElementById('learn-type-filter').value = 'all';
  document.getElementById('learn-detail').classList.add('hide');
  document.getElementById('learn-list').classList.remove('hide');
  filterLearnQuestions();
}

function filterLearnQuestions() {
  const search = document.getElementById('learn-search').value.trim().toLowerCase();
  const type = document.getElementById('learn-type-filter').value;
  
  let filtered = [...questions];
  if (type !== 'all') filtered = filtered.filter(q => q.type === type);
  if (search) filtered = filtered.filter(q => q.text.toLowerCase().includes(search));
  
  learnFilteredIds = filtered.map(q => q.id);
  
  if (filtered.length === 0) {
    document.getElementById('learn-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">没有找到匹配的题目</div>';
    return;
  }
  
  let html = '';
  filtered.forEach((q, i) => {
    const isLearned = state.learned[q.id];
    const isFav = state.fav[q.id];
    html += `<div class="wrong-item" onclick="showLearnDetail(${i})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span class="q-type ${q.type}">${q.type === 'mc' ? '选择题' : '判断题'}</span>
          <span style="font-size:12px;color:var(--text3);margin-left:6px">#${q.type==='mc'?q.id:q.id-1000}</span>
          ${isLearned ? '<span style="font-size:11px;color:var(--success);margin-left:6px">✓ 已学</span>' : ''}
        </div>
        <span class="fav-star ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav(${q.id})">${isFav?'★':'☆'}</span>
      </div>
      <div class="q" style="font-size:14px;margin-top:8px;line-height:1.5">${escapeHtml(q.text.substring(0,100))}${q.text.length>100?'...':''}</div>
    </div>`;
  });
  document.getElementById('learn-list').innerHTML = html;
}

function showLearnDetail(idx) {
  learnIdx = idx;
  learnDetail = true;
  document.getElementById('learn-list').classList.add('hide');
  document.getElementById('learn-detail').classList.remove('hide');
  renderLearnQuestion();
}

function showLearnList() {
  learnDetail = false;
  document.getElementById('learn-list').classList.remove('hide');
  document.getElementById('learn-detail').classList.add('hide');
  filterLearnQuestions();
}

function renderLearnQuestion() {
  const qId = learnFilteredIds[learnIdx];
  const q = questions.find(x => x.id === qId);
  if (!q) return;
  
  const isFav = state.fav[q.id];
  document.getElementById('learn-star').textContent = isFav ? '★' : '☆';
  document.getElementById('learn-star').classList.toggle('active', !!isFav);
  
  document.getElementById('learn-q-card').innerHTML = buildQuestionHTML(q, false, true);
}

function learnPrev() {
  if (learnIdx > 0) { learnIdx--; renderLearnQuestion(); }
  else showToast('已经是第一题了');
}

function learnNext() {
  if (learnIdx < learnFilteredIds.length - 1) { learnIdx++; renderLearnQuestion(); }
  else showToast('已经是最后一题了');
}

function toggleLearnFav() {
  const qId = learnFilteredIds[learnIdx];
  toggleFav(qId);
  renderLearnQuestion();
}

function toggleFav(qId) {
  if (state.fav[qId]) {
    delete state.fav[qId];
    showToast('已取消收藏');
  } else {
    state.fav[qId] = true;
    showToast('已收藏 ⭐');
  }
  saveState();
  if (document.getElementById('page-fav').classList.contains('active')) renderFavList('all');
}

// ===== BUILD QUESTION HTML =====
function buildQuestionHTML(q, showResult=false, showAnswer=false, interactive=false) {
  const optKeys = Object.keys(q.options);
  let html = `<div class="q-num"><span>${q.type === 'mc' ? '选择题' : '判断题'} #${q.type==='mc'?q.id:q.id-1000}</span></div>`;
  html += `<div class="q-text">${escapeHtml(q.text)}</div><div class="q-opts">`;
  
  optKeys.forEach(k => {
    let cls = 'q-opt';
    if (showResult && examAnswers[q.id] === k) {
      cls += ' selected';
    }
    if (showAnswer) {
      cls += ' disabled';
      if (k === q.answer) cls += ' correct';
      if (showResult && examAnswers[q.id] === k && k !== q.answer) cls += ' wrong';
    }
    const clickHandler = interactive ? `answerQuestion(${q.id},'${k}')` : '';
    html += `<div class="${cls}" onclick="${clickHandler}">
      <span class="letter">${k}</span>
      <span>${escapeHtml(q.options[k])}</span>
    </div>`;
  });
  html += '</div>';
  
  if (showAnswer && q.answer) {
    const hasAnswer = examAnswers && examAnswers[q.id];
    const isCorrect = hasAnswer && examAnswers[q.id] === q.answer;
    const bgColor = isCorrect ? '#2ecc7120' : (hasAnswer ? '#e74c3c20' : '#e85d0420');
    const icon = isCorrect ? '✅' : (hasAnswer ? '❌' : '💡');
    const msg = isCorrect ? '回答正确！' : (hasAnswer ? '正确答案：' + q.answer : '正确答案：' + q.answer);
    html += `<div style="margin-top:12px;padding:12px;border-radius:8px;background:${bgColor};font-size:13px;text-align:center;font-weight:500;color:var(--text)">${icon} ${msg}</div>`;
  }
  
  return html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ===== EXAM MODE =====
function showExamConfig() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-exam-config').classList.add('active');
  document.getElementById('header-title').textContent = '模拟考试';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function startExam() {
  const count = parseInt(document.getElementById('exam-count').value);
  const type = document.getElementById('exam-type').value;
  const timeMin = parseInt(document.getElementById('exam-time').value);
  
  let pool = [...questions];
  if (type === 'mc') pool = pool.filter(q => q.type === 'mc');
  if (type === 'tf') pool = pool.filter(q => q.type === 'tf');
  
  // Shuffle and pick
  shuffleArray(pool);
  examQuestions = pool.slice(0, Math.min(count, pool.length));
  examIdx = 0;
  examAnswers = {};
  examMarked = {};
  examDone = false;
  examSeconds = 0;
  examLimit = timeMin * 60;
  examResult = null;
  
  // Clear any existing timer
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(examTick, 1000);
  
  document.getElementById('page-exam-config').classList.remove('active');
  document.getElementById('page-exam').classList.add('active');
  document.getElementById('header-title').textContent = '考试中...';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  markStudied();
  renderExamQuestion();
  updateExamProgress();
}

function examTick() {
  examSeconds++;
  if (examLimit > 0 && examSeconds >= examLimit) {
    // Time's up - auto submit
    clearInterval(examTimer);
    examTimer = null;
    submitExam();
    return;
  }
  updateExamTimer();
}

function updateExamTimer() {
  const m = Math.floor(examSeconds / 60);
  const s = examSeconds % 60;
  document.getElementById('exam-timer').textContent = 
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  
  if (examLimit > 0) {
    const remaining = examLimit - examSeconds;
    if (remaining <= 300) {
      document.getElementById('exam-timer').style.color = 'var(--danger)';
    }
  }
}

function updateExamProgress() {
  const pct = ((examIdx + 1) / examQuestions.length * 100);
  document.getElementById('exam-progress-bar').style.width = pct + '%';
  document.getElementById('exam-pos').textContent = `${examIdx+1}/${examQuestions.length}`;
}

function renderExamQuestion() {
  if (examDone) return;
  const q = examQuestions[examIdx];
  if (!q) return;
  
  const isMarked = examMarked[q.id];
  document.getElementById('exam-mark-btn').textContent = isMarked ? '📌' : '🏳️';
  document.getElementById('exam-mark-btn').style.color = isMarked ? 'var(--primary)' : 'var(--text3)';
  
  // Show selected answer if any
  const tempAnswers = {...examAnswers};
  document.getElementById('exam-q-card').innerHTML = buildQuestionHTML(q, true, false, true);
  
  // Re-apply selected state after build
  if (examAnswers[q.id]) {
    const opts = document.querySelectorAll('#exam-q-card .q-opt');
    opts.forEach(opt => {
      const letter = opt.querySelector('.letter').textContent;
      if (letter === examAnswers[q.id]) {
        opt.classList.add('selected');
      }
    });
  }
  
  updateExamProgress();
  
  // Update next button
  const isLast = examIdx >= examQuestions.length - 1;
  document.getElementById('exam-next-btn').textContent = isLast ? '交卷 🏁' : '下一题 →';
}

function answerQuestion(qId, answer) {
  if (examDone) return;
  examAnswers[qId] = answer;
  
  // Visual feedback
  const opts = document.querySelectorAll('#exam-q-card .q-opt');
  opts.forEach(opt => {
    opt.classList.remove('selected');
    const letter = opt.querySelector('.letter').textContent;
    if (letter === answer) opt.classList.add('selected');
  });
  
  // Auto advance after answer
  setTimeout(() => {
    if (examIdx < examQuestions.length - 1) {
      examNext();
    }
  }, 300);
}

function examNext() {
  if (examIdx < examQuestions.length - 1) {
    examIdx++;
    renderExamQuestion();
  } else {
    // Last question - submit
    submitExam();
  }
}

function examPrev() {
  if (examIdx > 0) {
    examIdx--;
    renderExamQuestion();
  }
}

function examToggleMark() {
  if (examDone) return;
  const q = examQuestions[examIdx];
  if (examMarked[q.id]) {
    delete examMarked[q.id];
  } else {
    examMarked[q.id] = true;
  }
  renderExamQuestion();
}

function submitExam() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  examDone = true;
  
  let correct = 0, wrong = 0;
  const wrongList = [];
  
  examQuestions.forEach(q => {
    const userAns = examAnswers[q.id];
    if (userAns === q.answer) {
      correct++;
    } else {
      wrong++;
      wrongList.push({ qId: q.id, userAns, correctAns: q.answer });
      // Add to wrong collection
      if (!state.wrong[q.id]) state.wrong[q.id] = { count: 0, lastWrong: Date.now() };
      state.wrong[q.id].count++;
      state.wrong[q.id].lastWrong = Date.now();
    }
  });
  
  const score = examQuestions.length > 0 ? Math.round(correct / examQuestions.length * 100) : 0;
  
  examResult = { correct, wrong, total: examQuestions.length, score, time: examSeconds, wrongList };
  
  // Save exam record
  state.exams.push({ date: Date.now(), total: examQuestions.length, correct, wrong, time: examSeconds });
  saveState();
  
  // Show results
  document.getElementById('page-exam').classList.remove('active');
  document.getElementById('page-exam-result').classList.add('active');
  document.getElementById('header-title').textContent = '考试结果';
  
  initResultPage();
}

function initResultPage() {
  if (!examResult) return;
  const r = examResult;
  
  // Ring animation
  const circumference = 2 * Math.PI * 50;
  document.getElementById('result-ring').style.strokeDasharray = circumference;
  setTimeout(() => {
    document.getElementById('result-ring').style.strokeDasharray = circumference * r.score / 100;
  }, 100);
  
  document.getElementById('result-score').textContent = r.score + '%';
  document.getElementById('result-correct').textContent = r.correct;
  document.getElementById('result-wrong').textContent = r.wrong;
  document.getElementById('result-time').textContent = Math.round(r.time / 60);
}

function showExamReview() {
  if (!examResult) return;
  document.getElementById('page-exam-result').classList.remove('active');
  document.getElementById('page-exam-review').classList.add('active');
  document.getElementById('header-title').textContent = '答题详情';
  
  let html = '';
  examQuestions.forEach((q, i) => {
    const userAns = examAnswers[q.id];
    const isCorrect = userAns === q.answer;
    const status = isCorrect ? 'r-correct' : 'r-wrong';
    const mark = isCorrect ? '✅' : '❌';
    html += `<div class="review-item">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
        <span class="r-status ${status}"></span>
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i+1}. ${escapeHtml(q.text.substring(0,60))}</span>
      </div>
      <span style="font-size:12px;flex-shrink:0">${mark} ${q.answer}</span>
    </div>`;
  });
  document.getElementById('review-list').innerHTML = html;
}

// ===== DAILY CHALLENGE =====
function startDaily() {
  const today = new Date().toDateString();
  if (state.daily.date === today && state.daily.done) {
    showToast('今日已挑战完成！🔥');
    return;
  }
  
  // Pick 10 random questions
  let pool = [...questions];
  shuffleArray(pool);
  examQuestions = pool.slice(0, 10);
  examIdx = 0;
  examAnswers = {};
  examMarked = {};
  examDone = false;
  examSeconds = 0;
  examLimit = 600; // 10 min
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(examTick, 1000);
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-exam').classList.add('active');
  document.getElementById('header-title').textContent = '每日挑战 🔥';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  markStudied();
  renderExamQuestion();
  updateExamProgress();
  
  // Override submit to track daily
  const origSubmit = submitExam;
  window.submitExam = function() {
    state.daily.date = today;
    state.daily.done = true;
    saveState();
    origSubmit.call(this);
    window.submitExam = origSubmit;
    document.getElementById('daily-desc').textContent = '今日已完成！🔥';
  };
}

// ===== WRONG COLLECTION =====
function renderWrongList(filter) {
  const wrongIds = Object.keys(state.wrong).map(Number);
  if (wrongIds.length === 0) {
    document.getElementById('wrong-list').innerHTML = '';
    document.getElementById('wrong-empty').classList.remove('hide');
    document.getElementById('wrong-all-count').textContent = '0';
    return;
  }
  document.getElementById('wrong-empty').classList.add('hide');
  
  // Count by type
  let mcCount = 0, tfCount = 0;
  wrongIds.forEach(id => {
    const q = questions.find(x => x.id === id);
    if (q && q.type === 'mc') mcCount++;
    if (q && q.type === 'tf') tfCount++;
  });
  document.getElementById('wrong-all-count').textContent = wrongIds.length;
  document.getElementById('wrong-mc-count').textContent = mcCount;
  document.getElementById('wrong-tf-count').textContent = tfCount;
  
  let filtered = wrongIds.map(id => questions.find(q => q.id === id)).filter(Boolean);
  if (filter === 'mc') filtered = filtered.filter(q => q.type === 'mc');
  if (filter === 'tf') filtered = filtered.filter(q => q.type === 'tf');
  
  if (filtered.length === 0) {
    document.getElementById('wrong-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">没有匹配的错题</div>';
    return;
  }
  
  let html = '';
  filtered.forEach(q => {
    const wrongInfo = state.wrong[q.id];
    html += `<div class="wrong-item" onclick="showWrongDetail(${q.id})">
      <div>
        <span class="q-type ${q.type}">${q.type === 'mc' ? '选择题' : '判断题'}</span>
        <span style="font-size:12px;color:var(--text3);margin-left:6px">#${q.type==='mc'?q.id:q.id-1000}</span>
        <span style="font-size:11px;color:var(--danger);margin-left:6px">错${wrongInfo.count}次</span>
      </div>
      <div class="q" style="font-size:14px;margin-top:6px;line-height:1.5">${escapeHtml(q.text.substring(0,80))}</div>
      <div class="ans">正确答案：<span class="correct">${q.answer}</span></div>
    </div>`;
  });
  document.getElementById('wrong-list').innerHTML = html;
}

function showWrongDetail(qId) {
  const q = questions.find(x => x.id === qId);
  if (!q) return;
  
  document.getElementById('wrong-list').innerHTML = 
    `<div class="q-card">${buildQuestionHTML(q, false, true)}</div>
    <button class="modal-btn secondary" onclick="renderWrongList('all')" style="margin-top:12px">返回错题列表</button>`;
}

function filterWrong(type, btn) {
  document.querySelectorAll('#wrong-tabs .filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderWrongList(type);
}

function retakeWrong() {
  const wrongIds = Object.keys(state.wrong).map(Number);
  const pool = wrongIds.map(id => questions.find(q => q.id === id)).filter(Boolean);
  if (pool.length === 0) { showToast('没有错题可重做'); return; }
  
  shuffleArray(pool);
  examQuestions = pool.slice(0, Math.min(50, pool.length));
  examIdx = 0;
  examAnswers = {};
  examMarked = {};
  examDone = false;
  examSeconds = 0;
  examLimit = 0;
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(examTick, 1000);
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-exam').classList.add('active');
  document.getElementById('header-title').textContent = '错题重做';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  renderExamQuestion();
  updateExamProgress();
  
  // Override submit to clear correct answers
  const origSubmit = submitExam;
  window.submitExam = function() {
    // For wrong retake: remove from wrong if answered correctly
    examQuestions.forEach(q => {
      if (examAnswers[q.id] === q.answer && state.wrong[q.id]) {
        if (state.wrong[q.id].count <= 1) {
          delete state.wrong[q.id];
        } else {
          state.wrong[q.id].count--;
        }
      }
    });
    saveState();
    origSubmit.call(this);
    window.submitExam = origSubmit;
    showToast('错题本已更新！');
  };
}

function clearWrong() {
  if (Object.keys(state.wrong).length === 0) return;
  if (window.confirm('确定清空所有错题记录吗？')) {
    state.wrong = {};
    saveState();
    renderWrongList('all');
    updateHome();
    showToast('错题已清空');
  }
}

function showFavDetail(qId) {

function filterFav(type, btn) {

  btn.classList.add('active');
  renderFavList(type);
}

// ===== STATS =====
function renderStats() {
  const learned = Object.keys(state.learned).length;
  const total = questions.length;
  const wrongCount = Object.keys(state.wrong).length;
  const favCount = Object.keys(state.fav).length;
  
  document.getElementById('stats-learned').textContent = `${learned}/${total}`;
  document.getElementById('stats-wrong').textContent = wrongCount;
  document.getElementById('stats-fav').textContent = favCount;
  document.getElementById('stats-streak').textContent = state.daily.streak || 0;
  
  // Calculate accuracy from exam records
  const exams = state.exams || [];
  let mcCorrect = 0, mcTotal = 0, tfCorrect = 0, tfTotal = 0;
  
  exams.forEach(e => {
    // Estimate from total (rough split)
    mcTotal += Math.round(e.total * 0.42);
    tfTotal += Math.round(e.total * 0.58);
    mcCorrect += Math.round(e.correct * 0.42);
    tfCorrect += Math.round(e.correct * 0.58);
  });
  
  // Also count from wrong collection for accuracy
  // Total answers tracked = learned count
  const totalAnswered = learned;
  const totalCorrect = totalAnswered - wrongCount;
  const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
  
  document.getElementById('stats-pct').textContent = overallAcc + '%';
  
  // Ring
  const circumference = 2 * Math.PI * 42;
  document.getElementById('stats-ring').style.strokeDasharray = circumference;
  setTimeout(() => {
    document.getElementById('stats-ring').style.strokeDasharray = circumference * overallAcc / 100;
  }, 200);
  
  document.getElementById('stats-mc-acc').textContent = mcTotal > 0 ? Math.round(mcCorrect/mcTotal*100) + '%' : '0%';
  document.getElementById('stats-tf-acc').textContent = tfTotal > 0 ? Math.round(tfCorrect/tfTotal*100) + '%' : '0%';
  
  // Chart - top wrong questions
  const wrongIds = Object.keys(state.wrong).map(Number);
  const wrongCounts = wrongIds.map(id => ({ id, count: state.wrong[id].count }));
  wrongCounts.sort((a,b) => b.count - a.count);
  const topWrong = wrongCounts.slice(0, 5);
  
  if (topWrong.length === 0) {
    document.getElementById('stats-chart').innerHTML = '<p style="color:var(--text3);font-size:13px">暂无错题数据</p>';
  } else {
    const maxCount = Math.max(...topWrong.map(x => x.count));
    let chartHtml = '';
    topWrong.forEach(item => {
      const q = questions.find(x => x.id === item.id);
      const pct = maxCount > 0 ? (item.count / maxCount * 100) : 0;
      const label = q ? q.text.substring(0,30) : `#${item.id}`;
      chartHtml += `<div class="chart-bar">
        <span class="label">${escapeHtml(label)}</span>
        <div class="track"><div class="fill orange" style="width:${pct}%"></div></div>
        <span class="val">${item.count}</span>
      </div>`;
    });
    document.getElementById('stats-chart').innerHTML = chartHtml;
  }
}

// ===== UTILITIES =====
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function markStudied() {
  examQuestions.forEach(q => {
    state.learned[q.id] = true;
  });
  saveState();
}

// ===== SERVICE WORKER-LIKE: Handle page visibility for timer =====
document.addEventListener('visibilitychange', () => {
  if (document.hidden && examTimer) {
    // Timer keeps running
  }
});

// ===== INIT =====
init();
</script>
